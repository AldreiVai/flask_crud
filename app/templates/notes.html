<!DOCTYPE html>
<html>
<head>
    <title>Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container p-4">
        <h1 class="fw-bold">All Notes</h1>
        <form class="mb-3" action="{{ url_for('notes.add_note') }}" method="POST">
            <div class="d-flex justify-content-between">
                <input class="form-control" type="text" name="notes" required placeholder="Enter new note">
                <button class="btn btn-primary" type="submit">Add Note</button>
            </div>
        </form>

        <ul>
           {% for note in notes %}
<li class="mb-3">
    <div class="container-fluid border rounded p-3">

        {% if edit_id and edit_id == note.id %}
        <form action="{{ url_for('notes.update_note', id=note.id) }}" method="POST">
            <div class="d-flex align-items-center justify-content-between gap-2">

                <input 
                    type="text"
                    name="notes"
                    value="{{ note.notes }}"
                    class="form-control"
                    required
                >

                <div class="d-flex gap-2">
                    <button class="btn btn-success" type="submit">
                        Save
                    </button>

                    <a href="{{ url_for('notes.home') }}" class="btn btn-secondary">
                        Cancel
                    </a>
                </div>

            </div>
        </form>

        {% else %}
        <div class="d-flex align-items-center justify-content-between">

            <div>
                <strong>{{ note.notes }}</strong><br>
                <small class="text-muted">
                    Created at: {{ note.created_at.strftime("%B %d %Y") }}
                </small>
            </div>

            <div class="d-flex gap-2">
                <a href="{{ url_for('notes.edit_note', id=note.id) }}"
                   class="btn btn-secondary">
                    Edit
                </a>
                <form action="{{ url_for('notes.delete_note', id=note.id) }}"
                      method="POST"
                      onsubmit="return confirm('Delete this note?');">

                    <button class="btn btn-danger" type="submit">
                        Delete
                    </button>
                </form>
            </div>
        </div>
        {% endif %}
    </div>
</li>

{% else %}
<li class="text-muted">No notes found.</li>
{% endfor %}
        </ul>
        </div>
    </div>   
</body>
</html>
